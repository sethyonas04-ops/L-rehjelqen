<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lærehjelp</title>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --accent:#4a90e2;
  --user:#2563eb;
  --ai:#374151;
}

body{margin:0;font-family:Segoe UI,Arial;background:var(--bg);color:white;}
.hidden{display:none}

.container{max-width:1000px;margin:auto;padding:20px}
.card{background:var(--card);padding:20px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.3)}

h1{text-align:center}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
button{padding:12px;border:none;border-radius:10px;background:var(--accent);color:white;cursor:pointer}
button:hover{opacity:.9}

#messages{height:350px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.msg{padding:10px;border-radius:10px;max-width:75%}
.user{background:var(--user);margin-left:auto}
.ai{background:var(--ai)}

input{padding:10px;border-radius:10px;border:none;width:70%}

.top{display:flex;justify-content:space-between;margin-bottom:10px}
.badge{background:gold;color:black;padding:5px 10px;border-radius:10px}
</style>
</head>

<body>
<div class="container">

<h1>📚 Lærehjelp</h1>

<!-- TRINN VALG -->
<div id="gradeSelect" class="card">
<h2>Velg trinn</h2>
<div class="grid" id="grades"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="top">
<div>Trinn: <span id="grade"></span></div>
<div>Level: <span id="level">1</span></div>
<div class="badge">XP: <span id="xp">0</span></div>
</div>

<div class="card">
<h3>💬 AI Lærer</h3>
<div id="messages"></div>
<input id="input" placeholder="Spør om hva som helst...">
<button onclick="send()">Send</button>
</div>

<div class="card" style="margin-top:20px">
<h3>📚 Quiz</h3>
<button onclick="startQuiz()">Start quiz</button>
<div id="quizBox"></div>
</div>

</div>

</div>

<script>
// ===== STATE =====
let xp=0, level=1;
let locked=false;
let answer="";
let explanation="";
let userGrade=1;

// ===== TRINN SYSTEM =====
for(let i=1;i<=10;i++){
  let b=document.createElement("button");
  b.innerText=i+". trinn";
  b.onclick=()=>{
    userGrade=i;
    grade.innerText=i;
    gradeSelect.classList.add("hidden");
    app.classList.remove("hidden");
    add("Hei! Jeg er din AI-lærer. Jeg forklarer ting på nivået til trinn "+i+" 😊","ai");
  };
  grades.appendChild(b);
}

// ===== SMART AI =====
function smartExplain(topic){
  if(userGrade<=4){
    return "La oss ta det enkelt: " + topic + ". Kan du tenke litt selv først? 😊";
  }else if(userGrade<=7){
    return "La oss forklare steg for steg: " + topic + ". Hva tror du svaret kan være?";
  }else{
    return "Her er en forklaring: " + topic + ". Hvordan ville du løst det selv?";
  }
}

// ===== CHAT =====
function send(){
let text=input.value.toLowerCase();
if(!text) return;

add(text,"user");
input.value="";

setTimeout(()=>{

if(locked){
if(text.includes(answer)){
add("Riktig! 🎉","ai");
gainXP(20);
locked=false;
}else{
add("Ikke helt riktig. La oss gå dypere 👇","ai");
add(explanation,"ai");
add("Prøv igjen: "+answerQuestion(),"ai");
}
return;
}

let topic = "Dette handler om " + text;
let explain = smartExplain(topic);

add(explain,"ai");

explanation = "Tenk på dette: " + text + " betyr noe du må forstå steg for steg.";
answer = text.split(" ")[0];

setTimeout(()=>{
add("Kontrollspørsmål: Hva er hovedideen i '"+text+"'?","ai");
locked=true;
},800);

},500);
}

// ===== XP =====
function gainXP(x){
xp+=x;
if(xp>=level*50){
xp=0;level++;add("LEVEL UP 🚀","ai");}
updateUI();
}
function updateUI(){xpEl.innerText=xp;levelEl.innerText=level;}

// ===== QUIZ =====
const quizData={
1:[{q:"2+2?",a:"4"}],
5:[{q:"Hva er 10*10?",a:"100"}],
10:[{q:"Hva er derivert av x^2?",a:"2x"}]
};

function startQuiz(){
let set = quizData[userGrade] || quizData[1];
let q=set[Math.floor(Math.random()*set.length)];
quizBox.innerHTML=`<p>${q.q}</p><input id='quizInput'><button onclick="checkQuiz('${q.a}')">Svar</button>`;
}

function checkQuiz(a){
let v=document.getElementById("quizInput").value.toLowerCase();
if(v.includes(a)){
quizBox.innerHTML="Riktig! 🎉";
gainXP(15);
}else{
quizBox.innerHTML="Feil, prøv igjen";
}
}

// ===== UI =====
function add(t,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=t;
messages.appendChild(d);
messages.scrollTop=9999;
}

input.addEventListener("keypress",e=>{if(e.key==="Enter")send();});
</script>

</body>
</html>
