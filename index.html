<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Smart Skoleassistent</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom right, #f9f9f9, #cce7ff); margin: 0; }
header { background: #4A90E2; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.2);}
.container { padding: 20px; }
.view { display: none; animation: fadeIn 0.5s; }
.active { display: block; }
button { background: #4A90E2; color: white; border: none; padding: 12px 20px; margin: 5px 0; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.2s; }
button:hover { background: #357ABD; }
input, select, textarea { padding: 10px; width: 100%; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
textarea { resize: vertical; }
.icon { margin-right: 8px; }
h2 { color: #333; }
.card { background: white; border-radius: 12px; padding: 20px; margin: 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.15);}
#aiAnswer, #quizArea, #vocabArea { white-space: pre-wrap; margin-top: 10px; }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
</style>
</head>
<body>
<header>🎓 Smart Skoleassistent</header>
<div class="container">

<!-- View 1: Velg trinn -->
<div id="viewGrade" class="view active">
  <h2>Velg trinn</h2>
  <select id="gradeSelect">
    <option value="1">1. trinn</option>
    <option value="2">2. trinn</option>
    <option value="3">3. trinn</option>
    <option value="4">4. trinn</option>
    <option value="5">5. trinn</option>
    <option value="6">6. trinn</option>
    <option value="7">7. trinn</option>
    <option value="8">8. trinn</option>
    <option value="9">9. trinn</option>
    <option value="10">10. trinn</option>
  </select>
  <button onclick="goToMenu()">Neste <i class="fas fa-arrow-right"></i></button>
</div>

<!-- View 2: Hovedmeny -->
<div id="viewMenu" class="view">
  <h2>Velg funksjon</h2>
  <div class="card">
    <button onclick="showView('viewAI')"><i class="fas fa-robot icon"></i> AI-hjelp</button>
  </div>
  <div class="card">
    <button onclick="showView('viewQuiz')"><i class="fas fa-question-circle icon"></i> Quiz</button>
  </div>
  <div class="card">
    <button onclick="showView('viewVocab')"><i class="fas fa-book icon"></i> Gloseprøve</button>
  </div>
</div>

<!-- View 3: AI -->
<div id="viewAI" class="view">
  <h2>AI-hjelp</h2>
  <textarea id="aiQuestion" placeholder="Skriv spørsmålet ditt her..."></textarea>
  <button onclick="answerQuestion()">Få svar <i class="fas fa-lightbulb"></i></button>
  <p id="aiAnswer"></p>
  <button onclick="backToMenu()">← Tilbake</button>
</div>

<!-- View 4: Quiz -->
<div id="viewQuiz" class="view">
  <h2>Quiz</h2>
  <select id="quizSubject">
    <option value="matematikk">Matematikk</option>
    <option value="norsk">Norsk</option>
    <option value="engelsk">Engelsk</option>
    <option value="naturfag">Naturfag</option>
    <option value="historie">Historie</option>
    <option value="samfunnsfag">Samfunnsfag</option>
    <option value="geografi">Geografi</option>
    <option value="fremmedspråk">Fremmedspråk</option>
    <option value="religion">Religion</option>
    <option value="musikk">Musikk</option>
    <option value="idrett">Idrett</option>
  </select>
  <input type="text" id="quizTopic" placeholder="Tema for quiz (f.eks. brøk, fotosyntese)">
  <button onclick="startQuiz()">Start Quiz <i class="fas fa-play"></i></button>
  <div id="quizArea"></div>
  <button onclick="backToMenu()">← Tilbake</button>
</div>

<!-- View 5: Gloseprøve -->
<div id="viewVocab" class="view">
  <h2>Gloseprøve</h2>
  <textarea id="vocabList" placeholder="Skriv gloser her, ett per linje, norsk:engelsk"></textarea>
  <button onclick="startVocabTest()">Start gloseprøve <i class="fas fa-graduation-cap"></i></button>
  <div id="vocabArea"></div>
  <button onclick="backToMenu()">← Tilbake</button>
</div>

</div>

<script>
let gradeLevel;
let vocabList = [];
let currentVocab = 0;

// --- View management ---
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function backToMenu() { showView('viewMenu'); }
function goToMenu() { 
  gradeLevel = document.getElementById('gradeSelect').value;
  alert(`Valgt trinn: ${gradeLevel}. Trinn`);
  showView('viewMenu'); 
}

// --- AI-assistent ---
async function answerQuestion() {
  const question = document.getElementById('aiQuestion').value.trim();
  const answerElem = document.getElementById('aiAnswer');
  answerElem.innerText = "Laster svar...";

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer DIN_OPENAI_API_NOKKEL_HER"
      },
      body: JSON.stringify({
        model: "gpt-4",
        messages: [
          { role: "system", content: `Du er en skoleassistent. Svar aldri direkte på spørsmål, men lag et eksempel eller en historie som illustrerer løsningen. Tilpass svarene for trinn ${gradeLevel}.` },
          { role: "user", content: question }
        ],
        temperature: 0.7
      })
    });
    const data = await response.json();
    const aiText = data.choices[0].message.content;
    answerElem.innerText = aiText;
  } catch (err) {
    console.error(err);
    answerElem.innerText = "Noe gikk galt. Sjekk API-nøkkelen eller internett-tilkoblingen.";
  }
}

// --- Quiz ---
function startQuiz() {
  const subject = document.getElementById('quizSubject').value;
  const topic = document.getElementById('quizTopic').value.trim();
  const quizArea = document.getElementById('quizArea');
  quizArea.innerHTML = `<p>Quiz i ${subject} - Tema: ${topic}</p>`;
  for (let i = 1; i <= 3; i++) {
    quizArea.innerHTML += `<p>${i}. [Simulert spørsmål om ${topic}]</p>`;
  }
}

// --- Gloseprøve ---
function startVocabTest() {
  vocabList = document.getElementById('vocabList').value.trim().split('\n').map(line => {
    const parts = line.split(':');
    return { no: parts[0].trim(), en: parts[1].trim() };
  });
  currentVocab = 0;
  askNextVocab();
}

function askNextVocab() {
  const vocabArea = document.getElementById('vocabArea');
  if (currentVocab >= vocabList.length) {
    vocabArea.innerHTML = "<p>Du har fullført gloseprøven!</p>";
    return;
  }
  const word = vocabList[currentVocab];
  vocabArea.innerHTML = `
    <p>Hva er oversettelsen av "${word.no}"?</p>
    <input id="vocabAnswer" type="text">
    <button onclick="checkVocab()">Sjekk svar</button>
    <p id="vocabFeedback"></p>
  `;
}

function checkVocab() {
  const answer = document.getElementById('vocabAnswer').value.trim().toLowerCase();
  const word = vocabList[currentVocab];
  const feedback = document.getElementById('vocabFeedback');

  if (answer === word.en.toLowerCase()) {
    feedback.innerText = "Riktig!";
  } else {
    feedback.innerText = `Feil. Riktig svar: ${word.en}`;
  }

  currentVocab++;
  setTimeout(askNextVocab, 1500);
}
</script>
</body>
</html>
