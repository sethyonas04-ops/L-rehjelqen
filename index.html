<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>AI Læringsplattform EXTREME</title>

<style>
body { font-family: Arial; margin:0; background:#0f172a; color:white; }
.container { max-width:1000px; margin:auto; padding:20px; }

#messages { height:400px; overflow-y:auto; background:#1e293b; padding:10px; border-radius:10px; }
.msg { padding:10px; margin:5px; border-radius:10px; max-width:70%; }
.user { background:#3b82f6; margin-left:auto; }
.ai { background:#334155; }

input { padding:10px; width:70%; border-radius:10px; border:none; }
button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer; }

.quiz, .game { background:#1e293b; padding:10px; margin-top:10px; border-radius:10px; }

</style>
</head>

<body>
<div class="container">

<h1>🤖 AI Lærer EXTREME</h1>

<div>
Level: <span id="level">1</span> | XP: <span id="xp">0</span>
</div>

<div id="messages"></div>

<input id="input" placeholder="Spør om hva som helst...">
<button onclick="send()">Send</button>

<hr>

<h2>📚 Quiz</h2>
<div class="quiz">
<button onclick="startQuiz()">Start quiz</button>
<div id="quizBox"></div>
</div>

<h2>🎮 Spill</h2>
<div class="game">
<button onclick="startGame()">Start spill</button>
<div id="gameBox"></div>
</div>

</div>

<script>

// ===== STATE =====
let xp=0, level=1;
let locked=false;
let answer="";
let explanation="";

// ===== KNOWLEDGE BASE =====
const knowledge = [
{
keywords:["pi","sirkel"],
text:"Pi er et tall som brukes i sirkler. Det er ca 3.14.",
deep:"Pi er forholdet mellom omkrets og diameter i en sirkel.",
q:"Hva er første tallet i pi?",
a:"3"
},
{
keywords:["foto","plante"],
text:"Fotosyntese er hvordan planter lager energi.",
deep:"Planter bruker sollys, vann og CO2 for å lage glukose og oksygen.",
q:"Hva lager planter som vi puster?",
a:"oksygen"
},
{
keywords:["engelsk","language"],
text:"Engelsk er et globalt språk.",
deep:"Engelsk brukes i internasjonal kommunikasjon og teknologi.",
q:"Hva betyr 'hello' på norsk?",
a:"hei"
}
];

// ===== CHAT =====
function send(){
let text=input.value.toLowerCase();
if(!text) return;

add(text,"user");
input.value="";

setTimeout(()=>{

// LOCK SYSTEM
if(locked){
if(text.includes(answer)){
add("Riktig! 🎉","ai");
gainXP(20);
locked=false;
}else{
add("Feil ❌ La meg forklare bedre:\n"+explanation,"ai");
add("Nytt spørsmål: "+answerQuestion(),"ai");
}
return;
}

// FIND TOPIC
let found = knowledge.find(k => 
k.keywords.some(word => text.includes(word))
);

if(found){
add(found.text,"ai");
explanation=found.deep;
answer=found.a;
setTimeout(()=>{
add("Kontrollspørsmål: "+found.q,"ai");
locked=true;
},800);
}else{
add("Jeg kan forklare nesten alt 😄 men prøv et skoletema!", "ai");
}

},500);
}

// ===== XP SYSTEM =====
function gainXP(x){
xp+=x;
if(xp>=level*50){
xp=0;
level++;
add("LEVEL UP 🚀","ai");
}
updateUI();
}

function updateUI(){
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level;
}

// ===== QUIZ =====
let quizQ = [
{q:"2+2?", a:"4"},
{q:"Hva er hovedstaden i Norge?", a:"oslo"},
{q:"Hva betyr cat?", a:"katt"}
];

function startQuiz(){
let q = quizQ[Math.floor(Math.random()*quizQ.length)];
quizBox.innerHTML = `
<p>${q.q}</p>
<input id="quizInput">
<button onclick="checkQuiz('${q.a}')">Svar</button>
`;
}

function checkQuiz(a){
let val = document.getElementById("quizInput").value.toLowerCase();
if(val.includes(a)){
quizBox.innerHTML="Riktig! 🎉";
gainXP(15);
}else{
quizBox.innerHTML="Feil! Prøv igjen.";
}
}

// ===== GAME =====
function startGame(){
gameBox.innerHTML = `
<p>Trykk riktig svar!</p>
<button onclick="gameAnswer(true)">Riktig</button>
<button onclick="gameAnswer(false)">Feil</button>
`;
}

function gameAnswer(correct){
if(correct){
gameBox.innerHTML="Bra! 🎮";
gainXP(10);
}else{
gameBox.innerHTML="Oops! Prøv igjen";
}
}

// ===== UI =====
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
messages.appendChild(d);
messages.scrollTop=9999;
}

// ENTER KEY
input.addEventListener("keypress", e=>{
if(e.key==="Enter") send();
});

</script>
</body>
</html>
