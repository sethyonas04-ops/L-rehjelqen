<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Smart Skoleassistent</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
    h1 { color: #333; }
    .section { margin-bottom: 30px; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    button { margin-top: 10px; padding: 10px 20px; cursor: pointer; }
    input, select, textarea { padding: 5px; margin: 5px 0; width: 100%; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>Smart Skoleassistent</h1>

  <!-- Trinnvalg -->
  <div class="section" id="setup">
    <h2>Velg trinn</h2>
    <select id="grade">
      <option value="1">1. trinn</option>
      <option value="2">2. trinn</option>
      <option value="3">3. trinn</option>
      <option value="4">4. trinn</option>
      <option value="5">5. trinn</option>
      <option value="6">6. trinn</option>
      <option value="7">7. trinn</option>
      <option value="8">8. trinn</option>
      <option value="9">9. trinn</option>
      <option value="10">10. trinn</option>
    </select>
    <button onclick="startAssistant()">Start AI-assistent</button>
  </div>

  <!-- AI-hjelp -->
  <div class="section" id="aiSection" style="display:none;">
    <h2>AI-hjelp</h2>
    <textarea id="aiQuestion" placeholder="Skriv spørsmålet ditt her..."></textarea>
    <button onclick="answerQuestion()">Få svar</button>
    <p id="aiAnswer"></p>
  </div>

  <!-- Quiz -->
  <div class="section" id="quizSection">
    <h2>Quiz</h2>
    <select id="quizSubject">
      <option value="matematikk">Matematikk</option>
      <option value="norsk">Norsk</option>
      <option value="engelsk">Engelsk</option>
      <option value="naturfag">Naturfag</option>
      <option value="historie">Historie</option>
      <option value="samfunnsfag">Samfunnsfag</option>
      <option value="geografi">Geografi</option>
      <option value="fremmedspråk">Fremmedspråk</option>
      <option value="religion">Religion</option>
      <option value="musikk">Musikk</option>
      <option value="idrett">Idrett</option>
    </select>
    <input type="text" id="quizTopic" placeholder="Tema for quiz (f.eks. brøk, fotosyntese)">
    <button onclick="startQuiz()">Start Quiz</button>
    <div id="quizArea"></div>
  </div>

  <!-- Gloseprøve -->
  <div class="section" id="gloserSection">
    <h2>Gloseprøve</h2>
    <textarea id="vocabList" placeholder="Skriv gloser her, ett per linje, norsk:engelsk"></textarea>
    <button onclick="startVocabTest()">Start gloseprøve</button>
    <div id="vocabArea"></div>
  </div>

  <script>
    let gradeLevel;
    let vocabList = [];
    let currentVocab = 0;

    function startAssistant() {
      gradeLevel = document.getElementById('grade').value;
      document.getElementById('aiSection').style.display = 'block';
      alert(`AI-assistenten er nå tilpasset ${gradeLevel}. trinn`);
    }

    function answerQuestion() {
      const q = document.getElementById('aiQuestion').value.trim();
      let answer = "";

      // Matematikk + omformulering
      if (q.match(/\d+\s*\+\s*\d+/)) {
        const numbers = q.match(/\d+/g);
        answer = `Hvis Arne har ${numbers[0]} epler og Stine har ${numbers[1]} epler, og Arne gir sine til Stine, hvor mange har Stine da? Svaret blir ${parseInt(numbers[0]) + parseInt(numbers[1])}.`;
      } else if (q.match(/\d+\s*-\s*\d+/)) {
        const numbers = q.match(/\d+/g);
        answer = `Hvis Kari har ${numbers[0]} kaker og gir bort ${numbers[1]}, hvor mange har hun igjen? Svaret blir ${parseInt(numbers[0]) - parseInt(numbers[1])}.`;
      } else {
        // Generelt skolefag-svar
        answer = `Her er et svar på spørsmålet ditt tilpasset ${gradeLevel}. trinn: [Simulert svar, omformulert som et eksempel].`;
      }

      document.getElementById('aiAnswer').innerText = answer;
    }

    function startQuiz() {
      const subject = document.getElementById('quizSubject').value;
      const topic = document.getElementById('quizTopic').value.trim();
      const quizArea = document.getElementById('quizArea');

      quizArea.innerHTML = `<p>Quiz i ${subject} - Tema: ${topic}</p>`;
      for (let i = 1; i <= 3; i++) {
        quizArea.innerHTML += `<p>${i}. [Simulert spørsmål om ${topic}]</p>`;
      }
    }

    function startVocabTest() {
      vocabList = document.getElementById('vocabList').value.trim().split('\n').map(line => {
        const parts = line.split(':');
        return { no: parts[0].trim(), en: parts[1].trim() };
      });
      currentVocab = 0;
      askNextVocab();
    }

    function askNextVocab() {
      const vocabArea = document.getElementById('vocabArea');
      if (currentVocab >= vocabList.length) {
        vocabArea.innerHTML = "<p>Du har fullført gloseprøven!</p>";
        return;
      }
      const word = vocabList[currentVocab];
      vocabArea.innerHTML = `
        <p>Hva er oversettelsen av "${word.no}"?</p>
        <input id="vocabAnswer" type="text">
        <button onclick="checkVocab()">Sjekk svar</button>
        <p id="vocabFeedback"></p>
      `;
    }

    function checkVocab() {
      const answer = document.getElementById('vocabAnswer').value.trim().toLowerCase();
      const word = vocabList[currentVocab];
      const feedback = document.getElementById('vocabFeedback');

      if (answer === word.en.toLowerCase()) {
        feedback.innerText = "Riktig!";
      } else {
        feedback.innerText = `Feil. Riktig svar: ${word.en}`;
      }

      currentVocab++;
      setTimeout(askNextVocab, 1500);
    }
  </script>
</body>
</html>
