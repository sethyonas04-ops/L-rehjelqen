<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Smart Skoleassistent</title>
<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg, #6fb1fc, #4364f7);
  color: white;
}
header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
}
.container {
  padding: 20px;
}
.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  margin: 10px 0;
}
button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #4364f7;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #2f4ed8;
}
.view { display: none; }
.active { display: block; }
</style>
</head>

<body>

<header>🎓 Smart Skoleassistent</header>

<div class="container">

<!-- Velg trinn -->
<div id="view1" class="view active">
  <div class="card">
    <h2>Velg trinn</h2>
    <select id="grade">
      <option value="1">1. trinn</option>
      <option value="5">5. trinn</option>
      <option value="10">10. trinn</option>
    </select>
    <button onclick="goMenu()">Start</button>
  </div>
</div>

<!-- Meny -->
<div id="view2" class="view">
  <div class="card">
    <h2>Velg funksjon</h2>
    <button onclick="show('ai')">🤖 AI-hjelp</button>
    <button onclick="show('quiz')">❓ Quiz</button>
    <button onclick="show('vocab')">📚 Gloser</button>
  </div>
</div>

<!-- AI -->
<div id="ai" class="view">
  <div class="card">
    <h2>AI-hjelp</h2>
    <textarea id="q" placeholder="Spør noe..."></textarea>
    <button onclick="askAI()">Få svar</button>
    <p id="a"></p>
    <button onclick="back()">← Tilbake</button>
  </div>
</div>

<!-- Quiz -->
<div id="quiz" class="view">
  <div class="card">
    <h2>Quiz</h2>
    <p>Hva er 2 + 2?</p>
    <button onclick="alert('Riktig!')">4</button>
    <button onclick="alert('Feil!')">5</button>
    <button onclick="back()">← Tilbake</button>
  </div>
</div>

<!-- Gloser -->
<div id="vocab" class="view">
  <div class="card">
    <h2>Gloseprøve</h2>
    <p>Hva er "hund" på engelsk?</p>
    <input id="v">
    <button onclick="check()">Sjekk</button>
    <p id="res"></p>
    <button onclick="back()">← Tilbake</button>
  </div>
</div>

</div>

<script>
let grade;

function goMenu() {
  grade = document.getElementById("grade").value;
  show("view2");
}

function show(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function back() {
  show("view2");
}

// AI-kall til backend
async function askAI() {
  const question = document.getElementById("q").value;
  document.getElementById("a").innerText = "Laster...";

  const res = await fetch("http://localhost:3000/api/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question, grade })
  });

  const data = await res.json();
  document.getElementById("a").innerText = data.answer;
}

// Glose
function check() {
  const val = document.getElementById("v").value.toLowerCase();
  document.getElementById("res").innerText =
    val === "dog" ? "Riktig!" : "Feil!";
}
</script>

</body>
</html>
