<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lærehjelp EXTREME AI</title>

<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#4a90e2;--green:#22c55e;--red:#ef4444}
body{margin:0;font-family:Segoe UI;background:var(--bg);color:white}
.hidden{display:none}
section{padding:20px;max-width:1300px;margin:auto;height:100vh;display:flex;flex-direction:column}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}
.card{background:var(--card);padding:25px;border-radius:20px;text-align:center;cursor:pointer}
.card:hover{transform:scale(1.05)}

#messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:10px}
.msg{padding:14px;border-radius:14px;max-width:75%}
.user{background:#3b82f6;margin-left:auto}
.ai{background:#475569}

input{flex:1;padding:12px;border-radius:12px;border:none}
button{padding:10px;border:none;border-radius:10px;background:var(--accent);color:white}

.big{background:var(--card);padding:25px;border-radius:20px;margin-top:20px}

.backBtn{position:fixed;bottom:15px;left:15px;background:#334155}
</style>
</head>

<body>

<section id="start">
<h1>🚀 Lærehjelp AI</h1>
<div class="grid" id="grades"></div>
</section>

<section id="menu" class="hidden">
<h2 id="title"></h2>
<div class="grid">
<div class="card" onclick="goChat()">💬 AI Chat</div>
<div class="card" onclick="goQuiz()">📚 Quiz</div>
<div class="card" onclick="goGame()">🎮 Speed Game</div>
</div>
</section>

<section id="chat" class="hidden">
<h2>AI Lærer</h2>
<div id="messages"></div>
<div style="display:flex;gap:10px">
<input id="input">
<button onclick="send()">Send</button>
</div>
<button class="backBtn" onclick="back()">←</button>
</section>

<section id="quiz" class="hidden">
<h2>Quiz</h2>
<div class="big" id="quizBox"></div>
<button onclick="startQuiz()">Neste</button>
<button class="backBtn" onclick="back()">←</button>
</section>

<section id="game" class="hidden">
<h2>🔥 Speed Game</h2>
<div class="big" id="gameBox"></div>
<button onclick="startGame()">Start</button>
<button class="backBtn" onclick="back()">←</button>
</section>

<script>
let grade=4; // starter på 4 siden 1-3 er fjernet
let locked=false;
let correct="";
let explanation="";
let streak=0;
let speedStart=0;

// TRINN (4-10)
for(let i=4;i<=10;i++){
let b=document.createElement("div");
b.className="card";
b.innerText=i+". trinn";
b.onclick=()=>{grade=i;title.innerText="Trinn "+i;show("menu")};
grades.appendChild(b);
}

function show(id){document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden")}
function back(){show("menu")}
function goChat(){show("chat")}
function goQuiz(){show("quiz");startQuiz()}
function goGame(){show("game")}

// FORKLARINGER BASERT PÅ NIVÅ
function getExplanation(topic){
if(grade<=5) return `Enkelt forklart: ${topic} betyr noe grunnleggende. Tenk steg for steg og bruk eksempler.`;
if(grade<=7) return `Forklaring: ${topic} handler om et viktig begrep. Du må forstå hvordan det brukes i oppgaver.`;
return `Avansert forklaring: ${topic} er et faglig begrep. Du må forstå sammenhenger og bruke det i problemløsning.`;
}

function getMathHelp(text){
if(text.includes("+")) return "Tips: Legg sammen tallene ett og ett.";
if(text.includes("x")||text.includes("*") ) return "Tips: Ganging er gjentatt addisjon.";
if(text.includes("-")) return "Tips: Trekk fra det minste tallet fra det største.";
return "Prøv å bryte opp oppgaven steg for steg.";
}

// AI
function smartAI(input){
input=input.toLowerCase();

let topic=input.split(" ").slice(-1)[0];
let baseExplain=getExplanation(topic);
let mathHelp=getMathHelp(input);

correct=topic;
explanation=baseExplain + " " + mathHelp;

setTimeout(()=>{
add("Jeg forklarer først så du forstår 👇","ai");
setTimeout(()=>{
add(baseExplain,"ai");
setTimeout(()=>{
add("💡 " + mathHelp,"ai");
setTimeout(()=>{
add("Kontrollspørsmål: Hva betyr '"+topic+"'?","ai");
locked=true;
},1200);
},1200);
},1000);
},800);

return "La oss lære dette sammen.";
}

function send(){
let text=input.value;
if(!text)return;
add(text,"user");
input.value="";

setTimeout(()=>{
if(locked){
 if(text.toLowerCase().includes(correct)){
  add("Riktig! 🔓","ai");
  locked=false;
 }else{
  add("Feil ❌ " + explanation,"ai");
 }
 return;
}

let response=smartAI(text);
add(response,"ai");

},500);
}

function add(t,type){let d=document.createElement("div");d.className="msg "+type;d.innerText=t;messages.appendChild(d);messages.scrollTop=9999}

// QUIZ GENERATOR (1000+)
let quiz=[];
function generateQuiz(){
quiz=[];
for(let i=0;i<1000;i++){
let a=Math.floor(Math.random()*50);
let b=Math.floor(Math.random()*50);
quiz.push({q:`Hva er ${a}+${b}?`,a:(a+b).toString(),tip:"Legg sammen tallene"});
}
}
generateQuiz();

function startQuiz(){
let q=quiz[Math.floor(Math.random()*quiz.length)];
quizBox.innerHTML=`<p>${q.q}</p><p>💡 ${q.tip}</p><input id='qi'><button onclick="checkQuiz('${q.a}','${q.tip}')">Svar</button>`;
}

function checkQuiz(a,tip){
let v=document.getElementById("qi").value;
if(v==a){quizBox.innerHTML="Riktig!"}
else{quizBox.innerHTML="Feil ❌ Tips: "+tip}
}

// GAME
let gameQuestions=[];
function generateGame(){
gameQuestions=[];
for(let i=0;i<1000;i++){
let a=Math.floor(Math.random()*20);
let b=Math.floor(Math.random()*20);
gameQuestions.push({q:`${a}+${b}`,a:(a+b),tip:"Legg sammen"});
}
}
generateGame();

function startGame(){streak=0;nextQuestion()}

function nextQuestion(){
let q=gameQuestions[Math.floor(Math.random()*gameQuestions.length)];
speedStart=Date.now();

gameBox.innerHTML=`
<p>${q.q} = ?</p>
<p>💡 ${q.tip}</p>
<input id='gi'>
<button onclick="checkGame(${q.a},'${q.tip}')">Svar</button>
<p>Streak: ${streak}/10</p>
`;
}

function checkGame(c,tip){
let v=document.getElementById("gi").value;
if(v==c){
streak++;
if(streak>=10){gameBox.innerHTML="🔥 DU VANT!";return}
nextQuestion();
}else{
streak=0;
gameBox.innerHTML="Feil ❌ Tips: "+tip;
}
}

input.addEventListener("keypress",e=>{if(e.key==='Enter')send()});

</script>

</body>
</html>
