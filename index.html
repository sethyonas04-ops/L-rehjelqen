<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Lærer AI PRO+</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

/* Views */
.view { display:none; }
.active { display:block; }

/* Cards */
.card {
  background:white;
  color:black;
  padding:20px;
  border-radius:20px;
  margin:10px;
}

/* Buttons */
button {
  padding:18px;
  border:none;
  border-radius:15px;
  background:#667eea;
  color:white;
  cursor:pointer;
  font-size:18px;
  width:100%;
  margin-top:10px;
  transition:0.2s;
}
button:hover { background:#4c5fd7; transform:scale(1.02); }

/* Topbar */
.topbar {
  padding:15px;
  background:black;
  font-size:18px;
}

/* Inputs */
textarea, input, select {
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

/* CHAT STYLE */
.chat-box {
  max-height:300px;
  overflow-y:auto;
  margin-top:10px;
}

.msg {
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

.user {
  background:#667eea;
  color:white;
  text-align:right;
}

.ai {
  background:#eee;
}

/* Loading */
.loading {
  opacity:0.7;
  font-style:italic;
}
</style>
</head>

<body>

<div class="topbar">
XP: <span id="xp">0</span> |
Streak: <span id="streak">0</span>
</div>

<!-- START -->
<div id="start" class="view active">
  <div class="card">
    <h2>🎓 Velg klassetrinn</h2>
    <select id="grade">
      <option>1. klasse</option>
      <option>2. klasse</option>
      <option>3. klasse</option>
      <option>4. klasse</option>
      <option>5. klasse</option>
      <option>6. klasse</option>
      <option>7. klasse</option>
      <option>8. klasse</option>
      <option>9. klasse</option>
      <option>10. klasse</option>
      <option>VG1</option>
      <option>VG2</option>
      <option>VG3</option>
    </select>
    <button onclick="start()">Start</button>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="view">
  <div class="card">
    <h2>📚 Hva vil du gjøre?</h2>
    <button onclick="show('chat')">🤖 AI Lærer</button>
    <button onclick="show('quiz')">❓ Quiz</button>
    <button onclick="show('game')">🎮 Matte spill</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="view">
  <div class="card">
    <h2>🤖 AI lærer</h2>

    <div id="chatBox" class="chat-box"></div>

    <textarea id="msg" placeholder="Spør om hva som helst..."></textarea>
    <button onclick="send()">Send</button>
    <button onclick="speak()">🔊 Les opp siste svar</button>
    <button onclick="back()">← Tilbake</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="view">
  <div class="card">
    <h2>Quiz</h2>
    <p id="q"></p>
    <input id="ans">
    <button onclick="check()">Svar</button>
    <p id="res"></p>
    <button onclick="back()">←</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="view">
  <div class="card">
    <h2>Matte battle</h2>
    <p id="mathQ"></p>
    <input id="mathA">
    <button onclick="checkMath()">Svar</button>
    <button onclick="back()">←</button>
  </div>
</div>

<script>
let grade;
let xp=0;
let streak=0;
let lastReply="";

// NAV
function show(id){
 document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}
function back(){ show("menu"); }
function start(){
 grade=document.getElementById("grade").value;
 show("menu");
}

// 💬 CHAT UI
function addMessage(text, type){
 let div=document.createElement("div");
 div.className="msg "+type;
 div.innerText=text;
 document.getElementById("chatBox").appendChild(div);

 // auto scroll
 let box=document.getElementById("chatBox");
 box.scrollTop=box.scrollHeight;
}

// 🤖 AI CHAT
async function send(){
 let msg=document.getElementById("msg").value;
 if(!msg) return;

 addMessage(msg,"user");
 document.getElementById("msg").value="";

 let loading=document.createElement("div");
 loading.className="msg ai loading";
 loading.innerText="Tenker...";
 document.getElementById("chatBox").appendChild(loading);

 let res=await fetch("http://localhost:3000/ai",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    message: msg,
    grade: grade
  })
 });

 let data=await res.json();

 loading.remove();

 lastReply=data.reply;
 addMessage(data.reply,"ai");
}

// 🔊 SPEAK
function speak(){
 if(!lastReply) return;
 speechSynthesis.cancel(); // stopper gamle
 let u=new SpeechSynthesisUtterance(lastReply);
 u.lang="no-NO";
 u.rate=0.95;
 speechSynthesis.speak(u);
}

// QUIZ
let currentQ;
function newQ(){
 let a=Math.floor(Math.random()*10);
 let b=Math.floor(Math.random()*10);
 currentQ=a+b;
 document.getElementById("q").innerText=`Hva er ${a}+${b}?`;
}
newQ();

function check(){
 let val=parseInt(document.getElementById("ans").value);
 if(val===currentQ){
  streak++;
  xp+=10*streak;
  document.getElementById("res").innerText="Riktig!";
 } else {
  streak=0;
  document.getElementById("res").innerText="Feil!";
 }
 updateStats();
 newQ();
}

// GAME
let mathAnswer;
function newMath(){
 let a=Math.floor(Math.random()*20);
 let b=Math.floor(Math.random()*20);
 mathAnswer=a*b;
 document.getElementById("mathQ").innerText=`${a} × ${b}`;
}
newMath();

function checkMath(){
 let val=parseInt(document.getElementById("mathA").value);
 if(val===mathAnswer){
  xp+=20;
  document.getElementById("mathQ").innerText="🔥 Riktig!";
 } else {
  document.getElementById("mathQ").innerText="❌ Feil!";
 }
 updateStats();
 newMath();
}

function updateStats(){
 document.getElementById("xp").innerText=xp;
 document.getElementById("streak").innerText=streak;
}
</script>

</body>
</html>
