<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lærehjelp PRO MAX</title>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#4a90e2;
--green:#22c55e;
--red:#ef4444;
}

body{margin:0;font-family:Segoe UI;background:var(--bg);color:white}
.hidden{display:none}
section{padding:20px;max-width:1200px;margin:auto;height:100vh;display:flex;flex-direction:column}

h1,h2{text-align:center}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px}
.card{background:var(--card);padding:25px;border-radius:20px;text-align:center;cursor:pointer;transition:.2s}
.card:hover{transform:scale(1.05);background:#334155}

#messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px}
.msg{padding:14px;border-radius:14px;max-width:75%;line-height:1.4}
.user{background:#3b82f6;margin-left:auto}
.ai{background:#475569}

.input-area{display:flex;gap:10px;margin-top:10px}
input{flex:1;padding:12px;border-radius:12px;border:none}
button{padding:10px 15px;border:none;border-radius:12px;background:var(--accent);color:white;cursor:pointer}

.bigBox{background:var(--card);padding:25px;border-radius:20px;margin-top:20px}

.status{padding:8px;text-align:center;font-weight:bold}
.lock{color:orange}
.ok{color:var(--green)}
</style>
</head>

<body>

<!-- START -->
<section id="start">
<h1>📚 Lærehjelp</h1>
<h2>Velg trinn</h2>
<div class="grid" id="grades"></div>
</section>

<!-- MENU -->
<section id="menu" class="hidden">
<h2 id="title"></h2>
<div class="grid">
<div class="card" onclick="goChat()">💬 Chat</div>
<div class="card" onclick="goQuiz()">📚 Quiz</div>
<div class="card" onclick="goGame()">🎮 Spill</div>
<div class="card" onclick="goProgress()">🏆 Progress</div>
</div>
</section>

<!-- CHAT -->
<section id="chat" class="hidden">
<h2>AI Lærer</h2>
<div id="status" class="status">Klar</div>
<div id="messages"></div>
<div class="input-area">
<input id="input" placeholder="Spør om hva som helst...">
<button onclick="send()">Send</button>
</div>
<button onclick="back()">← Tilbake</button>
</section>

<!-- QUIZ -->
<section id="quiz" class="hidden">
<h2>Quiz</h2>
<div class="bigBox" id="quizBox"></div>
<button onclick="startQuiz()">Neste spørsmål</button>
<button onclick="back()">← Tilbake</button>
</section>

<!-- GAME -->
<section id="game" class="hidden">
<h2>Spill</h2>
<div class="bigBox" id="gameBox"></div>
<button onclick="startGame()">Start</button>
<button onclick="back()">← Tilbake</button>
</section>

<!-- PROGRESS -->
<section id="progress" class="hidden">
<h2>Din progresjon</h2>
<div class="bigBox" id="progressBox"></div>
<button onclick="back()">← Tilbake</button>
</section>

<script>
let grade=1;
let locked=false;
let correct="";
let explain="";
let xp=0;
let level=1;

// TRINN
for(let i=1;i<=10;i++){
 let b=document.createElement("div");
 b.className="card";
 b.innerText=i+". trinn";
 b.onclick=()=>{grade=i;title.innerText="Trinn "+i;show("menu")};
 grades.appendChild(b);
}

function show(id){document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden")}
function back(){show("menu")}
function goChat(){show("chat")}
function goQuiz(){show("quiz");startQuiz()}
function goGame(){show("game");startGame()}
function goProgress(){updateProgress();show("progress")}

// CHAT AI
function send(){
let text=input.value.toLowerCase();
if(!text)return;
add(text,"user");
input.value="";

setTimeout(()=>{

if(locked){
 if(text.includes(correct)){
  add("Riktig! Du går videre 🔓","ai");
  locked=false;
  xp+=10;
 }else{
  add("Feil ❌ Forklaring: "+explain,"ai");
 }
 updateStatus();
 return;
}

let response="";
if(grade<=4) response="La oss forklare enkelt: "+text;
else response="Dette er en forklaring på "+text+" med litt mer detaljer.";

add(response,"ai");

correct=text.split(" ")[0];
explain="Du må forstå begrepet bedre.";

setTimeout(()=>{
 add("Kontrollspørsmål: Hva betyr '"+correct+"'?","ai");
 locked=true;
 updateStatus();
},800);

},500);
}

function updateStatus(){
if(locked){status.innerText="🔒 Svar riktig for å gå videre";status.className="status lock"}
else{status.innerText="Klar";status.className="status ok"}
}

function add(t,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=t;
messages.appendChild(d);
messages.scrollTop=9999;
}

// QUIZ DATABASE
const quiz=[
{q:"2+2",a:"4"},{q:"5+5",a:"10"},{q:"10x10",a:"100"},
{q:"Hva er hovedstaden i Norge?",a:"oslo"},
{q:"Hva betyr hello?",a:"hei"},
{q:"Hva er 3x3",a:"9"},{q:"Hva er 12/2",a:"6"},
{q:"Hva er vann?",a:"h2o"},{q:"Hva er sol?",a:"stjerne"},
{q:"Hva er 7+8",a:"15"},{q:"Hva er 9+9",a:"18"}
];

function startQuiz(){
let q=quiz[Math.floor(Math.random()*quiz.length)];
quizBox.innerHTML=`
<p>${q.q}</p>
<input id='qi'>
<button onclick="checkQuiz('${q.a}')">Svar</button>
`;
}

function checkQuiz(a){
let v=document.getElementById("qi").value.toLowerCase();
if(v.includes(a)){
 quizBox.innerHTML="Riktig! +10 XP";
 xp+=10;
}else{
 quizBox.innerHTML="Feil! Prøv igjen";
}
}

// GAME
function startGame(){
let n=Math.floor(Math.random()*20);
let correct=n*2;

gameBox.innerHTML=`
<p>Hva er ${n} x 2?</p>
<input id='gi'>
<button onclick="checkGame(${correct})">Svar</button>
`;
}

function checkGame(c){
let v=document.getElementById("gi").value;
if(v==c){
 gameBox.innerHTML="Riktig! +5 XP";
 xp+=5;
}else{
 gameBox.innerHTML="Feil!";
}
}

// PROGRESS
function updateProgress(){
level=Math.floor(xp/50)+1;
progressBox.innerHTML=`
<p>XP: ${xp}</p>
<p>Level: ${level}</p>
`;
}

input.addEventListener("keypress",e=>{if(e.key==='Enter')send()});

</script>

</body>
</html>
